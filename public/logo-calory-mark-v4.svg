<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Calory logo concept v4</title>
  <desc id="desc">Minimal calorie tracking app logo with a clean plate-like mark and a measured segment.</desc>
  <defs>
    <linearGradient id="bg" x1="36" y1="30" x2="220" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9BEA62"/>
      <stop offset="0.52" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#15B8B0"/>
    </linearGradient>
    <linearGradient id="cut" x1="144" y1="74" x2="184" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7FFF2"/>
      <stop offset="1" stop-color="#BDF7E4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="64" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="64" fill="none" stroke="#ffffff" stroke-width="22"/>
    <path
      d="M158 76
         a56 56 0 0 1 26 26"
      fill="none"
      stroke="url(#cut)"
      stroke-width="22"
      stroke-linecap="round"
    />
    <rect x="117" y="102" width="22" height="52" rx="11" fill="#ffffff"/>
    <circle cx="128" cy="176" r="10" fill="#ffffff" opacity="0.96"/>
  </g>
</svg>
