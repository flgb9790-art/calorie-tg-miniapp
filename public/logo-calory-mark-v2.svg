    </filter>
  </defs>

  <circle cx="128" cy="128" r="112" fill="url(#bgGradient)" />
  <circle cx="128" cy="128" r="112" fill="url(#glowGradient)" />
  <circle cx="128" cy="128" r="108" fill="none" stroke="rgba(255,255,255,0.22)" />

