    <path
      d="M128 182c-9.4 0-17-7.6-17-17v-51.7H95.7c-6.9 0-10.4-8.3-5.6-13.3l32.3-33.6c3.1-3.3 8.2-3.3 11.4 0l32.3 33.6c4.8 5 1.3 13.3-5.6 13.3H145V165c0 9.4-7.6 17-17 17Z"
      fill="#FFFFFF"
    />
    <path
