<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Calory logo concept v2</title>
  <desc id="desc">Gradient circle with an upward arrow and a leaf above it.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="32" y1="28" x2="224" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7EE35C" />
      <stop offset="0.52" stop-color="#22C55E" />
      <stop offset="1" stop-color="#06B6D4" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(88 74) rotate(48) scale(108 96)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="leafGradient" x1="118" y1="50" x2="156" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9FFD7" />
